<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // 지도 초기화
        var map = L.map('map').setView([37.5665, 126.9780], 13); // 서울 중심

        // 타일 레이어 추가 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 마커 추가 예시
        L.marker([37.5665, 126.9780]).addTo(map)
            .bindPopup('서울 시청')
            .openPopup();

        var selectedMarker = null; // 선택된 마커

        // 지도 클릭 이벤트: 클릭한 위치 선택 및 마커 표시
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // 기존 마커 제거
            if (selectedMarker) {
                map.removeLayer(selectedMarker);
            }

            // 새 마커 추가
            selectedMarker = L.marker([lat, lng]).addTo(map)
                .bindPopup('선택된 위치')
                .openPopup();

            // Flutter로 메시지 전송
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('locationSelected', lat, lng);
            }
        });
    </script>
</body>
</html>
