<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Leaflet Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }

        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 12px;
            font-family: sans-serif;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <div id="status">지도를 불러오는 중...</div>
    <div id="map"></div>

    <script>
        // 로그 출력 및 Flutter 전송 함수
        function log(msg) {
            document.getElementById('status').textContent = msg;
            // webview_flutter 방식의 메시지 전달
            if (window.debugLog) {
                window.debugLog.postMessage(msg);
            }
        }

        // 지도 초기화 함수
        function initMap() {
            try {
                log('🚀 지도 초기화 시작');

                // 서울 중심으로 지도 생성
                var map = L.map('map').setView([37.5665, 126.9780], 13);

                // 타일 레이어 추가 (OpenStreetMap)
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // 기본 마커 추가
                var marker = L.marker([37.5665, 126.9780]).addTo(map);

                log('📍 클릭하여 위치를 선택하세요');

                // 클릭 이벤트 설정
                map.on('click', function (e) {
                    var lat = e.latlng.lat;
                    var lng = e.latlng.lng;

                    log('🎯 선택됨: ' + lat.toFixed(4) + ', ' + lng.toFixed(4));

                    // 마커 이동
                    marker.setLatLng(e.latlng);

                    // Flutter로 데이터 전송 (addJavaScriptChannel에서 설정한 이름 사용)
                    if (window.locationSelected) {
                        window.locationSelected.postMessage(JSON.stringify({
                            lat: lat,
                            lng: lng
                        }));
                    } else {
                        log('❌ Flutter 채널을 찾을 수 없음');
                    }
                });

            } catch (err) {
                log('❌ 에러 발생: ' + err.message);
            }
        }

        // DOM이 로드된 후 실행
        window.onload = initMap;
    </script>
</body>

</html>
